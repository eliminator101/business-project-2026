<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抵Buy — 購物示範 Shopping Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@500;700;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#fffdf8;
    --ink:#161221;
    --magenta:#ff1f6b;
    --lemon:#ffe14d;
    --cobalt:#2b4bff;
    --edge:5px;
    --shadow:6px 6px 0 var(--ink);
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    font-family:"Poppins","Noto Sans TC",system-ui,sans-serif;
    background:var(--white);
    color:var(--ink);
    overflow-x:hidden;
  }

  .stage{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:clamp(16px,3vh,40px) clamp(16px,4vw,48px);
  }
  .stage::before{
    content:"";
    position:absolute;inset:0;
    background-image:radial-gradient(var(--ink) 1.4px, transparent 1.4px);
    background-size:26px 26px;
    opacity:.06;
    z-index:0;
  }
  .blob{
    position:absolute;border-radius:50%;z-index:0;filter:blur(2px);opacity:.9;
  }
  .blob.a{width:120px;height:120px;background:var(--lemon);top:20px;left:-20px}
  .blob.b{width:80px;height:80px;background:var(--cobalt);bottom:10%;right:-10px;opacity:.85}
  .blob.c{width:50px;height:50px;background:var(--magenta);top:40%;left:5%}
  .dash{position:absolute;width:30px;height:8px;border-radius:8px;z-index:0}
  .dash.d1{background:var(--cobalt);top:18%;right:20%;transform:rotate(20deg)}
  .dash.d2{background:var(--magenta);top:60%;left:10%;transform:rotate(-25deg)}
  .star-lil{position:absolute;font-family:"Fredoka";font-weight:700;z-index:0;font-size:24px}
  .star-lil.s1{top:15%;right:12%;color:var(--magenta);transform:rotate(-15deg)}
  .star-lil.s2{bottom:20%;left:15%;color:var(--cobalt);transform:rotate(12deg)}

  .topbar{
    position:relative;z-index:5;
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
    width:100%;max-width:900px;
    margin-bottom:24px;
  }
  .brand-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--magenta);color:#fff;
    font-family:"Fredoka","Noto Sans TC";font-weight:700;
    font-size:clamp(20px,3vw,26px);letter-spacing:.02em;
    padding:10px 18px;border-radius:40px;
    border:var(--edge) solid var(--ink);
    box-shadow:var(--shadow);
    transform:rotate(-1.2deg);
  }
  .brand-chip span{color:var(--lemon)}
  .theme-chip{
    font-family:"Noto Sans TC";font-weight:700;
    font-size:clamp(12px,1.5vw,15px);
    background:var(--lemon);color:var(--ink);
    border:var(--edge) solid var(--ink);
    padding:7px 15px;border-radius:12px;
    transform:rotate(1.4deg);
    box-shadow:4px 4px 0 var(--ink);
  }

  .phone-frame{
    position:relative;z-index:5;
    width:min(92vw,380px);
    aspect-ratio:9/20;
    max-height:min(86vh,760px);
    border:8px solid var(--ink);
    border-radius:44px;
    box-shadow:14px 18px 0 var(--ink), 0 0 0 2px rgba(255,255,255,.4) inset;
    background:var(--ink);
    overflow:hidden;
  }
  .notch{
    position:absolute;
    top:0;left:50%;transform:translateX(-50%);
    width:120px;height:26px;
    background:var(--ink);
    border-radius:0 0 18px 18px;
    z-index:10;
  }
  .screen{
    width:100%;height:100%;
    background:var(--white);
    border-radius:36px;
    overflow-y:auto;
    overflow-x:hidden;
    padding:34px 16px 20px;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none}

  .status-bar{
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Poppins";font-weight:700;font-size:12px;
    padding:0 6px 10px;
  }

  .app-header{
    text-align:center;margin-bottom:14px;
  }
  .app-header h2{
    font-family:"Fredoka","Noto Sans TC";font-weight:700;
    font-size:24px;
  }
  .app-header h2 span{color:var(--magenta)}
  .app-header p{
    font-family:"Noto Sans TC";font-weight:700;
    font-size:12px;color:var(--cobalt);
  }

  .section-title{
    font-family:"Noto Sans TC";font-weight:900;
    font-size:15px;
    margin:14px 4px 10px;
  }

  .product-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .product-card{
    background:#fff;
    border:3px solid var(--ink);
    border-radius:16px;
    box-shadow:4px 4px 0 var(--ink);
    padding:12px;
    text-align:center;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .product-card:nth-child(odd){transform:rotate(-1deg)}
  .product-card:nth-child(even){transform:rotate(1deg)}
  .product-card:hover{transform:scale(1.03) rotate(0deg)}
  .product-card .emoji{
    font-size:42px;line-height:1;margin-bottom:6px;
  }
  .product-card h4{
    font-family:"Noto Sans TC","Poppins";font-weight:700;
    font-size:12px;line-height:1.25;
    margin-bottom:4px;
  }
  .product-card .price{
    font-family:"Poppins";font-weight:800;
    font-size:14px;color:var(--magenta);
  }

  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:#fff;
    border:3px solid var(--ink);
    border-radius:20px;
    padding:6px 12px;
    font-family:"Noto Sans TC";font-weight:700;
    font-size:13px;
    box-shadow:3px 3px 0 var(--ink);
    cursor:pointer;margin-bottom:12px;
  }
  .back-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

  .checkout-view .hero{
    width:120px;height:120px;
    margin:0 auto 12px;
    background:var(--lemon);
    border:var(--edge) solid var(--ink);
    border-radius:24px;
    box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;
    font-size:64px;
  }
  .checkout-view h2{
    font-family:"Noto Sans TC","Poppins";font-weight:900;
    font-size:18px;text-align:center;line-height:1.25;
    margin-bottom:4px;
  }
  .checkout-view h2 small{
    display:block;
    font-family:"Noto Sans TC";font-weight:700;
    font-size:13px;color:var(--cobalt);
  }
  .price-box{
    background:#fff;
    border:3px solid var(--ink);
    border-radius:var(--radius);
    box-shadow:4px 4px 0 var(--ink);
    padding:12px 14px;
    margin:14px 0;
  }
  .price-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;
    border-bottom:2px dashed rgba(22,18,33,.15);
    font-family:"Poppins","Noto Sans TC";font-weight:700;
    font-size:14px;
  }
  .price-row:last-child{border-bottom:none}
  .price-row b{font-family:"Poppins";font-weight:800}
  .price-row .total{color:var(--magenta);font-size:16px}

  .address-box{
    background:#fff;
    border:3px solid var(--ink);
    border-radius:var(--radius);
    box-shadow:4px 4px 0 var(--cobalt);
    padding:12px 14px;
    margin-bottom:14px;
  }
  .address-box p{
    font-family:"Noto Sans TC","Poppins";font-weight:600;
    font-size:12px;line-height:1.5;
    margin-bottom:8px;
  }
  .address-box p:last-child{margin-bottom:0}
  .address-box b{color:var(--cobalt)}

  .checkout-btn{
    width:100%;
    background:var(--magenta);color:#fff;
    border:var(--edge) solid var(--ink);
    border-radius:40px;
    padding:14px;
    font-family:"Noto Sans TC","Poppins";font-weight:900;
    font-size:16px;
    box-shadow:4px 4px 0 var(--ink);
    cursor:pointer;
    margin-top:4px;
  }
  .checkout-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
  .checkout-btn:disabled{opacity:.8;cursor:wait}

  .ios-notification{
    position:fixed;
    top:-180px;
    left:50%;
    transform:translateX(-50%);
    width:min(360px,92vw);
    background:rgba(255,253,248,.96);
    backdrop-filter:blur(12px);
    border:3px solid var(--ink);
    border-radius:22px;
    box-shadow:0 10px 0 rgba(22,18,33,.25);
    padding:12px 14px;
    transition:top .45s cubic-bezier(.34,1.56,.64,1);
    z-index:100;
    cursor:pointer;
  }
  .ios-notification.show{top:14px}
  .notification-head{
    display:flex;align-items:center;gap:8px;
    margin-bottom:6px;
  }
  .notification-head .app-name{
    font-family:"Poppins";font-weight:700;font-size:13px;
  }
  .notification-head .time{
    margin-left:auto;
    font-family:"Poppins";font-weight:600;font-size:12px;color:rgba(22,18,33,.6);
  }
  .notification-body b{
    font-family:"Noto Sans TC","Poppins";font-weight:900;
    font-size:14px;
  }
  .notification-body p{
    font-family:"Noto Sans TC","Poppins";font-weight:600;
    font-size:13px;line-height:1.4;
    margin-top:3px;
  }
  .notification-body .price-tag{
    display:inline-block;
    background:var(--lemon);border:2px solid var(--ink);border-radius:8px;
    padding:1px 6px;
  }

  .view{display:none}
  .view.active{display:block}

  .footer{
    position:relative;z-index:5;
    text-align:center;
    padding:20px;
    font-family:"Noto Sans TC";font-weight:700;
    font-size:12px;
    color:var(--ink);
    opacity:.7;
  }

  @media (max-width:420px){
    .topbar{justify-content:center;text-align:center}
  }
  :focus-visible{outline:4px solid var(--cobalt);outline-offset:3px;border-radius:4px}
</style>
</head>

</div>

<script>
  const productGrid = document.getElementById('productGrid');
  const checkoutContent = document.getElementById('checkoutContent');
  const listView = document.getElementById('listView');
  const checkoutView = document.getElementById('checkoutView');
  const backBtn = document.getElementById('backBtn');
  const notification = document.getElementById('iosNotification');
  const notificationBody = document.getElementById('notificationBody');
  let products = [];
  let currentProduct = null;
  let notificationTimer;

    async function loadProducts() {
    try {
      const res = await fetch('products.json');
      const data = await res.json();
      products = data.products;
    } catch (err) {
      console.warn('fetch failed (likely file:// protocol), using embedded JSON fallback', err);
      try {
        products = JSON.parse(document.getElementById('products-data').textContent).products;
      } catch (fallbackErr) {
        productGrid.innerHTML = '<p style="text-align:center;font-weight:700;color:var(--magenta);grid-column:1/-1">載入失敗<br>Loading failed</p>';
        console.error(fallbackErr);
        return;
      }
    }
    renderList();
  }

  function renderList() {
    productGrid.innerHTML = products.map(p => `
      <article class="product-card" data-id="${p.id}" tabindex="0" role="button" aria-label="${escapeHtml(p.name)}">
        <div class="emoji">${p.image}</div>
        <h4>${escapeHtml(p.name)}<br><small>${escapeHtml(p.nameZh)}</small></h4>
        <div class="price">HK$${p.price}</div>
      </article>
    `).join('');

    productGrid.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', () => showCheckout(card.dataset.id));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') showCheckout(card.dataset.id); });
    });
  }

  function showCheckout(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    currentProduct = p;

    checkoutContent.innerHTML = `
      <div class="hero">${p.image}</div>
      <h2>${escapeHtml(p.name)} <small>${escapeHtml(p.nameZh)}</small></h2>
      <div class="price-box">
        <div class="price-row"><span>Price 價格</span><b>HK$${p.price}</b></div>
        <div class="price-row"><span>Shipping 運費</span><b>HK$${p.shipping}</b></div>
        <div class="price-row"><span>ETA 預計</span><b>${escapeHtml(p.eta)}</b></div>
        <div class="price-row"><span>Total 總計</span><b class="total">HK$${p.price + p.shipping}</b></div>
      </div>
      <div class="address-box">
        <p><b>Deliver to 送到：</b><br>${escapeHtml(p.address)}</p>
        <p><b>Ship from 寄出：</b><br>${escapeHtml(p.warehouse)}</p>
      </div>
      <button class="checkout-btn" id="checkoutBtn">Checkout 結賬</button>
    `;

    document.getElementById('checkoutBtn').addEventListener('click', handleCheckout);

    listView.classList.remove('active');
    checkoutView.classList.add('active');
  }

  function showList() {
    checkoutView.classList.remove('active');
    listView.classList.add('active');
    currentProduct = null;
  }

  function handleCheckout() {
    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.textContent = 'Processing… 處理中';

    setTimeout(() => {
      showNotification(currentProduct);
      btn.disabled = false;
      btn.textContent = 'Checkout 結賬';
    }, 600);
  }

  function showNotification(p) {
    notificationBody.innerHTML = `
      <b>發現更抵價！Cheaper price found</b>
      <p>${escapeHtml(p.cheaper.source)} 有 ${escapeHtml(p.nameZh)}，只需 <span class="price-tag">HK$${p.cheaper.price}</span><br>Save HK$${p.price - p.cheaper.price} now!</p>
    `;
    notification.classList.add('show');
    clearTimeout(notificationTimer);
    notificationTimer = setTimeout(() => notification.classList.remove('show'), 5000);
  }

  notification.addEventListener('click', () => {
    notification.classList.remove('show');
    clearTimeout(notificationTimer);
  });

  backBtn.addEventListener('click', showList);

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadProducts();
</script>
